site_name: OnBoard Docs
site_description: Documentation for OnBoard Framework
site_author: Henrycooper9
site_url: https://henrycooper9.github.io/Onboard/

repo_name: henrycooper9/Onboard
repo_url: https://github.com/henrycooper9/Onboard

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: grey
  features:
    - navigation.expand
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - API Reference: api.md
  - Configuration: config.md